info:
  name: Create otp on 1on1
  type: http
  seq: 7

http:
  method: POST
  url: "{{baseUrl}}/users/session-booking/create-otp"
  body:
    type: json
    data: |-
      {
      "phone_number" : "+9779761207414"
      }
